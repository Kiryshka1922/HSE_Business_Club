services:
  backend:
    restart: always
    build:
      context: backend
      dockerfile: Dockerfile
    env_file:
      - .env.docker 
    depends_on:
      mongodb: 
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./backend:/app/backend
    ports:
      - "3000:3000"
      
  mongodb:
    image: mongo:latest
    container_name: mongodb
    environment:
      - MONGODB_DATABASE=mock
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
      
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        - API_URL=http://backend:3000/api  # передаём на этапе сборки
    ports:
      - "8080:3000"
    networks:
      - app-network
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:3000/api  # для runtime (SSR)
      - NODE_ENV=production
    restart: always

networks:
  app-network: {}

volumes:
  mongodb_data: