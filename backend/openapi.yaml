openapi: 3.0.0
paths:
  /api/peoples:
    get:
      operationId: PeoplesController_getPeoples
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PeopleDto'
      tags: &ref_0
        - Peoples
  /api/peoples/{id}:
    patch:
      operationId: PeoplesController_updatePeople
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
      tags: *ref_0
  /api/events:
    get:
      operationId: EventsController_getEvents
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventDto'
      tags: &ref_1
        - Events
  /api/events/{id}:
    patch:
      operationId: EventsController_updateEvents
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
      tags: *ref_1
info:
  title: Busines_Club API
  description: Mini-app for busines_club
  version: '1.0'
  contact: {}
tags:
  - name: app
    description: ''
servers: []
components:
  schemas:
    ObjectId:
      type: object
      properties: {}
    PeopleDto:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        age:
          type: number
        interests:
          type: array
          items:
            type: string
        description:
          type: string
        tg_username:
          type: string
        type_activity:
          type: string
        photo_url:
          type: string
          format: uri
        isLiked:
          type: boolean
        _id:
          $ref: '#/components/schemas/ObjectId'
      required:
        - first_name
        - last_name
        - age
        - interests
        - description
        - tg_username
        - type_activity
        - photo_url
    EventDto:
      type: object
      properties:
        start_time:
          type: string
          pattern: /^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$/
        end_time:
          type: string
          pattern: /^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$/
        speaker_name:
          type: string
        company_name:
          type: string
        title:
          type: string
        place:
          type: string
        isLiked:
          type: boolean
        photo_url:
          type: string
          format: uri
        _id:
          $ref: '#/components/schemas/ObjectId'
      required:
        - start_time
        - end_time
        - speaker_name
        - company_name
        - title
        - place
